spring:
  datasource:
    url: jdbc:h2:mem:testdb-test
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    show-sql: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: never
