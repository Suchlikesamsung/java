spring:
  application:
    name: api

  profiles:
    default: local

server:
  port: 8080

app:
  jwt:
    secret: local-development-jwt-secret-key-must-be-at-least-32-bytes
    expiration-milliseconds: 3600000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
